<!-- Botón para crear ticket -->
<div style="text-align: center; margin-top: 30px;">
    <button onclick="openTicketModal()" style="background: #0A1F44; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1rem; cursor: pointer;">
        <i class="fas fa-ticket-alt"></i> ¿No encontraste lo que buscabas? Abrir ticket
    </button>
</div>

<!-- Modal para crear ticket -->
<div id="ticketModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; max-width: 500px; width: 90%; padding: 25px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h3><i class="fas fa-ticket-alt"></i> Crear ticket de soporte</h3>
            <span onclick="closeTicketModal()" style="cursor: pointer; font-size: 1.5rem;">&times;</span>
        </div>
        <div class="form-group"><label>Nombre</label><input type="text" id="ticketName" placeholder="Tu nombre"></div>
        <div class="form-group"><label>Email</label><input type="email" id="ticketEmail" placeholder="tu@email.com"></div>
        <div class="form-group"><label>Asunto</label><input type="text" id="ticketSubject" placeholder="¿Sobre qué es tu consulta?"></div>
        <div class="form-group"><label>Mensaje</label><textarea id="ticketMessage" rows="4" placeholder="Describe tu problema..."></textarea></div>
        <button onclick="createTicket()" style="background: #0A1F44; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer;">Enviar ticket</button>
    </div>
</div>

<script>
    function openTicketModal() {
        document.getElementById('ticketModal').style.display = 'flex';
        // Cargar datos del usuario logueado si existe
        const token = localStorage.getItem('token');
        if (token) {
            fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json())
                .then(user => {
                    document.getElementById('ticketName').value = user.name || '';
                    document.getElementById('ticketEmail').value = user.email || '';
                });
        }
    }
    
    function closeTicketModal() {
        document.getElementById('ticketModal').style.display = 'none';
        document.getElementById('ticketName').value = '';
        document.getElementById('ticketEmail').value = '';
        document.getElementById('ticketSubject').value = '';
        document.getElementById('ticketMessage').value = '';
    }
    
    async function createTicket() {
        const data = {
            user_name: document.getElementById('ticketName').value,
            user_email: document.getElementById('ticketEmail').value,
            subject: document.getElementById('ticketSubject').value,
            message: document.getElementById('ticketMessage').value
        };
        
        if (!data.user_name || !data.user_email || !data.subject || !data.message) {
            alert('Por favor completa todos los campos');
            return;
        }
        
        try {
            const res = await fetch('/api/support/create-ticket', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                alert('✅ Ticket creado exitosamente. Te responderemos pronto.');
                closeTicketModal();
            } else {
                alert('❌ Error al crear el ticket');
            }
        } catch(e) {
            alert('Error de conexión');
        }
    }
</script>
