# 1. Asegurarnos que la carpeta existe
mkdir -p /app/public

# 2. Crear el archivo admin.html LIMPIO de nuevo
cat > /app/public/admin.html << 'EOF'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Farol - Panel Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; }
        button { width: 95%; padding: 12px; background: #1A237E; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #error { color: #ff5252; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🏮 El Farol Admin</h2>
        <input type="email" id="email" placeholder="Email" value="admin@elfarol.com.do">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">INGRESAR</button>
        <div id="error"></div>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok && data.user.role === 'admin') {
                localStorage.setItem('adminToken', data.token);
                window.location.reload(); 
            } else {
                document.getElementById('error').innerText = 'Acceso denegado o datos incorrectos';
            }
        }
    </script>
</body>
</html>
EOF
