<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | El Farol Clasificados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A1F44;
            --primary-hover: #0D2B5A;
            --accent: #D4AF37;
            --bg: #F4F7F9;
            --white: #ffffff;
            --text: #1A1A1A;
            --text-muted: #6C757D;
            --border: #E0E0E0;
            --danger: #C62828;
            --danger-light: #FFEBEE;
            --success: #2E7D32;
            --success-light: #E8F5E9;
            --warning: #E65100;
            --warning-light: #FFF3E0;
            --shadow: 0 2px 10px rgba(0,0,0,0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

        /* LOGIN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            background-image: radial-gradient(circle at 20% 50%, rgba(212,175,55,0.08) 0%, transparent 60%);
        }
        .login-box {
            background: var(--white);
            padding: 44px 40px;
            border-radius: 6px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            margin-bottom: 6px;
        }
        .login-box h2 {
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }
        .login-box p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 28px;
        }
        .login-box input {
            width: 100%;
            padding: 13px 14px;
            margin: 6px 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: var(--primary); }
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 13px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: var(--accent); color: var(--primary); }
        #loginError { color: var(--danger); margin-top: 14px; font-size: 0.8rem; min-height: 20px; }

        /* LAYOUT PRINCIPAL */
        .app { display: none; min-height: 100vh; flex-direction: row; }
        .app.visible { display: flex; }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 3px solid var(--accent);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-brand h3 {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .sidebar-brand p {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sidebar-nav { padding: 16px 10px; flex: 1; }
        .sidebar-nav label {
            color: rgba(255,255,255,0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0 10px;
            display: block;
            margin: 16px 0 6px;
        }
        .nav-btn {
            width: 100%;
            padding: 11px 14px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .nav-btn i { width: 16px; text-align: center; font-size: 0.9rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.06); color: white; }
        .nav-btn.active { background: var(--accent); color: var(--primary); font-weight: 600; }
        .sidebar-footer {
            padding: 16px 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-user {
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .sidebar-user strong { color: white; font-size: 0.85rem; display: block; }
        .sidebar-user span { color: var(--accent); font-size: 0.7rem; }
        .btn-logout {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 9px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            text-align: left;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: #ff8a80; }

        /* CONTENIDO PRINCIPAL */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar {
            background: var(--white);
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topbar h1 { font-size: 1.1rem; font-weight: 600; color: var(--primary); }
        .topbar-meta { color: var(--text-muted); font-size: 0.8rem; }
        #pendingBadge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 6px;
            display: none;
        }
        .content { padding: 28px; flex: 1; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; margin-bottom: 28px; }
        .stat-card {
            background: var(--white);
            padding: 22px 20px;
            border-radius: 4px;
            box-shadow: var(--shadow);
            border-bottom: 3px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-icon { font-size: 1.4rem; color: var(--accent); }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--primary); line-height: 1; }
        .stat-label { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; }

        /* TABLAS */
        .section-card {
            background: var(--white);
            border-radius: 4px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .section-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-header h3 { font-size: 0.95rem; font-weight: 600; color: var(--primary); }
        .section-header span { font-size: 0.75rem; color: var(--text-muted); }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #FAFBFC;
            color: var(--text-muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 12px 18px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        td {
            padding: 13px 18px;
            border-bottom: 1px solid #F5F5F5;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #FAFBFC; }
        .empty-row td { text-align: center; padding: 40px; color: var(--text-muted); }

        /* BADGES */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 2px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-warning { background: var(--warning-light); color: var(--warning); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
        .badge-info { background: #E3F2FD; color: #1565C0; }

        /* BOTONES */
        .btn { padding: 7px 14px; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 0.78rem; font-weight: 600; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        .btn-view { background: var(--primary); color: white; }
        .btn-sm { padding: 5px 10px; font-size: 0.72rem; }
        .btn-gap { display: flex; gap: 6px; flex-wrap: wrap; }

        /* PANEL DE FOTOS */
        .photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .photo-preview img { width: 120px; height: 90px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; }
        .photo-placeholder { width: 120px; height: 90px; background: var(--bg); border: 1px dashed var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--white);
            border-radius: 6px;
            max-width: 560px;
            width: 92%;
            max-height: 86vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .modal-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-head h3 { font-size: 1rem; font-weight: 600; }
        .modal-close { font-size: 1.4rem; cursor: pointer; color: var(--text-muted); background: none; border: none; line-height: 1; }
        .modal-close:hover { color: var(--danger); }
        .modal-body { padding: 22px 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

        .info-row { display: flex; margin-bottom: 12px; gap: 8px; }
        .info-label { color: var(--text-muted); font-size: 0.8rem; min-width: 120px; font-weight: 500; }
        .info-value { font-size: 0.85rem; font-weight: 500; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }
        .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 0.85rem; resize: vertical; min-height: 80px; outline: none; }
        .form-group textarea:focus { border-color: var(--primary); }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--primary);
            color: white;
            padding: 13px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* LOADING */
        .loading-state { text-align: center; padding: 50px; color: var(--text-muted); }
        .loading-state i { font-size: 1.5rem; margin-bottom: 12px; display: block; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .app { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; }
            .sidebar-nav { padding: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
            .sidebar-nav label { display: none; }
            .nav-btn { width: auto; flex: 1; min-width: 80px; justify-content: center; font-size: 0.75rem; padding: 9px 10px; }
            .nav-btn i { display: none; }
            .content { padding: 16px; }
            .topbar { padding: 14px 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">🏮</div>
        <h2>EL FAROL ADMIN</h2>
        <p>Panel de administración</p>
        <input type="email" id="adminEmail" placeholder="Email corporativo" value="admin@elfarol.com.do" autocomplete="email">
        <input type="password" id="adminPassword" placeholder="Contraseña" value="admin123" autocomplete="current-password">
        <button class="btn-login" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> ACCEDER AL PANEL
        </button>
        <div id="loginError"></div>
    </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app" class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h3>🏮 EL FAROL</h3>
            <p>Centro de control</p>
        </div>
        <div class="sidebar-nav">
            <label>Principal</label>
            <button class="nav-btn active" id="navDashboard" onclick="navTo('dashboard')">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
            <button class="nav-btn" id="navVerifications" onclick="navTo('verifications')">
                <i class="fas fa-user-check"></i> Verificaciones
                <span id="pendingBadge" style="background:#C62828;color:white;padding:1px 7px;border-radius:10px;font-size:0.68rem;margin-left:auto;display:none;"></span>
            </button>
            <label>Gestión</label>
            <button class="nav-btn" id="navUsers" onclick="navTo('users')">
                <i class="fas fa-users"></i> Usuarios
            </button>
            <button class="nav-btn" id="navAds" onclick="navTo('ads')">
                <i class="fas fa-clipboard-list"></i> Anuncios
            </button>
        </div>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <strong id="sidebarName">Admin</strong>
                <span>Administrador</span>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="main">
        <div class="topbar">
            <h1 id="pageTitle">Dashboard</h1>
            <span class="topbar-meta" id="topbarMeta"></span>
        </div>
        <div class="content" id="contentArea">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
        </div>
    </div>
</div>

<!-- MODAL UNIVERSAL -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="modalTitle">Detalle</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
// ============================================================
// ESTADO
// ============================================================
let token = null;
let currentAdmin = null;
let currentView = 'dashboard';

// ============================================================
// UTILIDADES
// ============================================================
function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('es-DO', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function formatPrice(p) {
    if (!p && p !== 0) return '-';
    return 'RD$ ' + Number(p).toLocaleString('es-DO');
}

function showToast(msg, type = 'success') {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
    t.innerHTML = `<i class="fas ${icon}"></i> ${escHtml(msg)}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

async function apiFetch(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(path, { ...opts, headers });
    if (res.status === 401) { logout(); return null; }
    return res.json();
}

function openModal(title, body, footer = '') {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFooter').innerHTML = footer;
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ============================================================
// AUTH
// ============================================================
async function login() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';

    if (!email || !password) { errEl.textContent = 'Completa todos los campos.'; return; }

    try {
        const data = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        }).then(r => r.json());

        if (data.success && data.user.role === 'admin') {
            token = data.token;
            currentAdmin = data.user;
            localStorage.setItem('adminToken', token);
            localStorage.setItem('adminUser', JSON.stringify(currentAdmin));
            showApp();
        } else if (data.success) {
            errEl.textContent = 'Tu cuenta no tiene permisos de administrador.';
        } else {
            errEl.textContent = data.error || 'Credenciales incorrectas.';
        }
    } catch (e) {
        errEl.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
    }
}

function logout() {
    token = null;
    currentAdmin = null;
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'flex';
}

function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('sidebarName').textContent = currentAdmin?.name || 'Admin';
    navTo('dashboard');
}

// ============================================================
// NAVEGACIÓN
// ============================================================
function navTo(view) {
    currentView = view;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('nav' + view.charAt(0).toUpperCase() + view.slice(1));
    if (btn) btn.classList.add('active');

    const titles = { dashboard: 'Dashboard', verifications: 'Solicitudes de Verificación', users: 'Gestión de Usuarios', ads: 'Gestión de Anuncios' };
    document.getElementById('pageTitle').textContent = titles[view] || view;

    const views = { dashboard: loadDashboard, verifications: loadVerifications, users: loadUsers, ads: loadAds };
    if (views[view]) views[view]();
}

// ============================================================
// DASHBOARD
// ============================================================
async function loadDashboard() {
    const area = document.getElementById('contentArea');
    area.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Cargando estadísticas...</div>';

    const data = await apiFetch('/api/admin/stats');
    if (!data) return;

    document.getElementById('topbarMeta').textContent = 'Actualizado ahora';

    // Badge de pendientes
    if (data.pendingVerifications > 0) {
        const badge = document.getElementById('pendingBadge');
        badge.textContent = data.pendingVerifications;
        badge.style.display = 'inline-block';
    }

    area.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-number">${data.totalUsers || 0}</div>
                <div class="stat-label">Usuarios registrados</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
                <div class="stat-number">${data.totalAds || 0}</div>
                <div class="stat-label">Anuncios totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-fire"></i></div>
                <div class="stat-number">${data.activeAds || 0}</div>
                <div class="stat-label">Anuncios activos</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-number">${data.verifiedUsers || 0}</div>
                <div class="stat-label">Vendedores verificados</div>
            </div>
            <div class="stat-card" style="border-bottom-color: ${data.pendingVerifications > 0 ? 'var(--danger)' : 'var(--accent)'};">
                <div class="stat-icon" style="color:${data.pendingVerifications > 0 ? 'var(--danger)' : 'var(--accent)'};">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-number" style="color:${data.pendingVerifications > 0 ? 'var(--danger)' : 'var(--primary)'};">
                    ${data.pendingVerifications || 0}
                </div>
                <div class="stat-label">Verificaciones pendientes</div>
            </div>
        </div>

        ${data.pendingVerifications > 0 ? `
        <div class="section-card" style="border-left: 4px solid var(--danger);">
            <div class="section-header">
                <h3 style="color:var(--danger);"><i class="fas fa-exclamation-circle"></i> Acción requerida</h3>
            </div>
            <div style="padding: 20px 22px;">
                <p>Tienes <strong>${data.pendingVerifications}</strong> solicitud(es) de verificación esperando revisión.</p>
                <button class="btn btn-approve" style="margin-top:12px;" onclick="navTo('verifications')">
                    <i class="fas fa-user-check"></i> Revisar ahora
                </button>
            </div>
        </div>` : ''}

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
            <div class="section-card" style="cursor:pointer;" onclick="navTo('users')">
                <div class="section-header"><h3><i class="fas fa-users"></i> Usuarios</h3></div>
                <div style="padding:20px 22px;color:var(--text-muted);">Ver y gestionar todos los usuarios registrados →</div>
            </div>
            <div class="section-card" style="cursor:pointer;" onclick="navTo('ads')">
                <div class="section-header"><h3><i class="fas fa-clipboard-list"></i> Anuncios</h3></div>
                <div style="padding:20px 22px;color:var(--text-muted);">Moderar y eliminar anuncios del marketplace →</div>
            </div>
        </div>
    `;
}

// ============================================================
// VERIFICACIONES
// ============================================================
async function loadVerifications() {
    const area = document.getElementById('contentArea');
    area.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Cargando solicitudes...</div>';

    const data = await apiFetch('/api/admin/verification-requests');
    if (!data) return;

    const rows = data.requests || [];
    document.getElementById('topbarMeta').textContent = `${rows.length} pendiente(s)`;

    if (!rows.length) {
        area.innerHTML = `
            <div class="section-card">
                <div class="loading-state" style="color:var(--success);">
                    <i class="fas fa-check-circle" style="color:var(--success);"></i>
                    No hay solicitudes pendientes. Todo al día ✓
                </div>
            </div>`;
        return;
    }

    // Ocultar badge si ya estamos aquí
    document.getElementById('pendingBadge').style.display = 'none';

    area.innerHTML = `
        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-user-check"></i> Solicitudes pendientes</h3>
                <span>${rows.length} para revisar</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Solicitado</th>
                            <th>Documentos</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(r => `
                        <tr>
                            <td><strong>#${r.id}</strong></td>
                            <td>${escHtml(r.name || 'Sin nombre')}</td>
                            <td>${escHtml(r.email)}</td>
                            <td>${escHtml(r.phone || '-')}</td>
                            <td style="font-size:0.78rem;color:var(--text-muted);">${formatDate(r.requested_at)}</td>
                            <td>
                                <button class="btn btn-view btn-sm" onclick="viewVerification(${r.id}, ${r.user_id})">
                                    <i class="fas fa-eye"></i> Ver fotos
                                </button>
                            </td>
                            <td>
                                <div class="btn-gap">
                                    <button class="btn btn-approve btn-sm" onclick="approveVerification(${r.user_id}, '${escHtml(r.name)}')">
                                        <i class="fas fa-check"></i> Aprobar
                                    </button>
                                    <button class="btn btn-reject btn-sm" onclick="rejectVerification(${r.user_id}, '${escHtml(r.name)}')">
                                        <i class="fas fa-times"></i> Rechazar
                                    </button>
                                </div>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
}

async function viewVerification(reqId, userId) {
    const data = await apiFetch('/api/admin/verification-requests');
    const req = (data?.requests || []).find(r => r.id === reqId);
    if (!req) { showToast('No se encontró la solicitud', 'error'); return; }

    const photoHtml = (src, label) => src
        ? `<div><div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;">${label}</div><img src="${src}" style="width:140px;height:100px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;" onclick="window.open('${src}','_blank')" title="Click para ampliar"></div>`
        : `<div><div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;">${label}</div><div class="photo-placeholder">Sin imagen</div></div>`;

    openModal(`Verificación — ${req.name}`, `
        <div class="info-row"><span class="info-label">Usuario</span><span class="info-value">${escHtml(req.name)}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value">${escHtml(req.email)}</span></div>
        <div class="info-row"><span class="info-label">Teléfono</span><span class="info-value">${escHtml(req.phone || '-')}</span></div>
        <div class="info-row"><span class="info-label">Solicitado</span><span class="info-value">${formatDate(req.requested_at)}</span></div>
        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
        <p style="font-size:0.8rem;font-weight:600;margin-bottom:12px;color:var(--text-muted);">DOCUMENTOS ADJUNTOS</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
            ${photoHtml(req.id_photo_front, 'Cédula — Frente')}
            ${photoHtml(req.id_photo_back, 'Cédula — Reverso')}
            ${photoHtml(req.selfie_photo, 'Selfie')}
        </div>
        <div class="form-group" style="margin-top:20px;">
            <label>Notas del administrador (opcional)</label>
            <textarea id="verifyNotes" placeholder="Ej: Cédula legible, datos correctos..."></textarea>
        </div>
    `, `
        <button class="btn btn-reject" onclick="rejectVerification(${userId}, '${escHtml(req.name)}')">
            <i class="fas fa-times"></i> Rechazar
        </button>
        <button class="btn btn-approve" onclick="approveVerification(${userId}, '${escHtml(req.name)}')">
            <i class="fas fa-check"></i> Aprobar verificación
        </button>
    `);
}

async function approveVerification(userId, name) {
    const notes = document.getElementById('verifyNotes')?.value || '';
    if (!confirm(`¿Aprobar la verificación de ${name}?\nEsto le dará el sello de vendedor verificado.`)) return;

    const data = await apiFetch(`/api/admin/verify/${userId}/approve`, {
        method: 'POST',
        body: JSON.stringify({ notes })
    });

    if (data?.success) {
        showToast(`✓ ${name} verificado correctamente`, 'success');
        closeModal();
        loadVerifications();
    } else {
        showToast(data?.error || 'Error al aprobar', 'error');
    }
}

async function rejectVerification(userId, name) {
    const notes = document.getElementById('verifyNotes')?.value || '';
    if (!confirm(`¿Rechazar la solicitud de ${name}?`)) return;

    const data = await apiFetch(`/api/admin/verify/${userId}/reject`, {
        method: 'POST',
        body: JSON.stringify({ notes: notes || 'Solicitud rechazada por el administrador.' })
    });

    if (data?.success) {
        showToast(`Solicitud de ${name} rechazada`, 'error');
        closeModal();
        loadVerifications();
    } else {
        showToast(data?.error || 'Error al rechazar', 'error');
    }
}

// ============================================================
// USUARIOS
// ============================================================

    const data = await apiFetch('/api/admin/users');
    if (!data) return;

    const users = data.users || [];
    document.getElementById('topbarMeta').textContent = `${users.length} usuarios`;

    area.innerHTML = `
        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-users"></i> Todos los usuarios</h3>
                <span>${users.length} registrados</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Tipo</th>
                            <th>Plan</th>
                            <th>Estado</th>
                            <th>Registrado</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.length ? users.map(u => `
                        <tr>
                            <td style="color:var(--text-muted);">#${u.id}</td>
                            <td><strong>${escHtml(u.name || 'Sin nombre')}</strong>
                                ${u.role === 'admin' ? '<span class="badge badge-info" style="margin-left:5px;">admin</span>' : ''}
                            </td>
                            <td style="font-size:0.82rem;">${escHtml(u.email)}</td>
                            <td>
                                ${u.user_type === 'seller'
                                    ? '<span class="badge badge-warning">Vendedor</span>'

                            <td>
                                ${u.plan_type === 'premium'

                                        ? '<span class="badge badge-warning">Pro</span>'
                                        : '<span style="color:var(--text-muted);font-size:0.78rem;">Free</span>'}
                            </td>
                            <td>
                                ${u.verified
                                    ? '<span class="badge badge-success"><i class="fas fa-check"></i> Verificado</span>'
                                    : '<span class="badge" style="background:#F5F5F5;color:#999;">Sin verificar</span>'}
                            </td>
                            <td style="font-size:0.78rem;color:var(--text-muted);">${formatDate(u.created_at)}</td>
                        </tr>`).join('')

}

// ============================================================
// ANUNCIOS
// ============================================================
async function loadAds() {
    const area = document.getElementById('contentArea');
    area.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Cargando anuncios...</div>';

    const data = await apiFetch('/api/admin/ads');
    if (!data) return;

    const ads = data.ads || [];
    document.getElementById('topbarMeta').textContent = `${ads.length} anuncios`;

    area.innerHTML = `
        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-clipboard-list"></i> Todos los anuncios</h3>
                <span>${ads.length} publicados</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Vendedor</th>
                            <th>Precio</th>
                            <th>Sector</th>
                            <th>Categoría</th>
                            <th>Estado</th>
                            <th>Vistas</th>
                            <th>Fecha</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ads.length ? ads.map(a => `
                        <tr>
                            <td style="color:var(--text-muted);">#${a.id}</td>
                            <td style="max-width:180px;"><strong>${escHtml(a.title)}</strong></td>
                            <td style="font-size:0.8rem;">${escHtml(a.user_name || a.user_email || '-')}</td>
                            <td style="font-weight:600;color:var(--primary);">${formatPrice(a.price)}</td>
                            <td style="font-size:0.8rem;">${escHtml(a.ubicacion_sector || '-')}</td>
                            <td style="font-size:0.78rem;">${escHtml(a.category || '-')}</td>
                            <td>
                                ${a.status === 'active'
                                    ? '<span class="badge badge-success">Activo</span>'
                                    : a.status === 'sold'
                                        ? '<span class="badge badge-info">Vendido</span>'
                                        : `<span class="badge badge-warning">${escHtml(a.status)}</span>`}
                                ${a.boosted_expires && new Date(a.boosted_expires) > new Date()
                                    ? '<span class="badge badge-warning" style="margin-left:3px;"><i class="fas fa-fire"></i></span>' : ''}
                            </td>
                            <td style="text-align:center;">${a.views || 0}</td>
                            <td style="font-size:0.75rem;color:var(--text-muted);">${formatDate(a.created_at)}</td>
                            <td>
                                <button class="btn btn-delete btn-sm" onclick="deleteAd(${a.id}, '${escHtml(a.title).replace(/'/g,'')}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>`).join('')
                        : '<tr><td colspan="10" class="empty-row"><i class="fas fa-clipboard-list"></i><br>No hay anuncios</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>`;
}

async function deleteAd(id, title) {
    if (!confirm(`¿Eliminar el anuncio:\n"${title}"?\n\nEsta acción no se puede deshacer.`)) return;

    const data = await apiFetch(`/api/admin/ads/${id}`, { method: 'DELETE' });
    if (data?.success) {
        showToast('Anuncio eliminado', 'success');
        loadAds();
    } else {
        showToast(data?.error || 'Error al eliminar', 'error');
    }
}

// ============================================================
// INICIO — Verificar sesión guardada
// ============================================================
(function init() {
    const savedToken = localStorage.getItem('adminToken');
    const savedUser = localStorage.getItem('adminUser');
    if (savedToken && savedUser) {
        try {
            token = savedToken;
            currentAdmin = JSON.parse(savedUser);
            showApp();
        } catch {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
        }
    }

    // Enter en login
    document.getElementById('adminPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
})();
</script>
