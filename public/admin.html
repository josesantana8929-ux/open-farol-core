<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - El Farol</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-[#001f3f] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🏮 Panel de Control MXL</h1>
            <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded text-sm">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <!-- Estadísticas Rápidas -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-600">
                <p class="text-gray-500 text-sm">Total Usuarios</p>
                <h2 id="totalUsers" class="text-3xl font-bold">...</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-600">
                <p class="text-gray-500 text-sm">Anuncios Activos</p>
                <h2 id="totalAds" class="text-3xl font-bold">...</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-600">
                <p class="text-gray-500 text-sm">Verificaciones Pendientes</p>
                <h2 id="pendingVerif" class="text-3xl font-bold">...</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-bold mb-4">Acciones del Administrador</h3>
            <div class="flex flex-wrap gap-4">
                <button class="bg-[#001f3f] text-white px-6 py-2 rounded">Gestionar Usuarios</button>
                <button class="bg-[#001f3f] text-white px-6 py-2 rounded">Revisar Anuncios</button>
                <button class="bg-orange-600 text-white px-6 py-2 rounded">Ver Solicitudes ID</button>
            </div>
        </div>
    </div>

    <script>
        // Verificar si eres admin
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin';

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                document.getElementById('totalUsers').innerText = data.totalUsers || 0;
                document.getElementById('totalAds').innerText = data.totalAds || 0;
                document.getElementById('pendingVerif').innerText = data.pendingVerifications || 0;
            } catch (e) { console.error("Error cargando stats"); }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin';
        }

        loadStats();
    </script>
</body>
</html>
