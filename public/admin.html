# Crear el archivo admin.html
cat > public/admin.html << 'EOF'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol | Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; }
        
        /* Login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A1A1A 0%, #2A2A2A 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }
        .login-box h2 { margin-bottom: 24px; text-align: center; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-primary {
            width: 100%;
            background: #1A237E;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        
        /* Dashboard */
        .admin-wrapper { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #1A1A1A;
            color: white;
            position: fixed;
            height: 100vh;
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid #333; }
        .sidebar-logo { font-size: 1.5rem; font-weight: 800; }
        .sidebar-logo span { color: #1A237E; }
        .sidebar-user { padding: 24px; border-bottom: 1px solid #333; }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: #1A237E;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: #CCC;
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { background: #1A237E; color: white; }
        .main-content { flex: 1; margin-left: 280px; padding: 24px; }
        .topbar {
            background: white;
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #E0E0E0;
        }
        .stat-value { font-size: 2rem; font-weight: 700; margin-top: 12px; }
        .table-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 8px; color: #757575; }
        td { padding: 12px 8px; border-bottom: 1px solid #F0F0F0; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .status-active { background: #10B98120; color: #10B981; }
        .btn-approve { background: #10B981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 8px; }
        .btn-delete { background: #EF4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .logout-btn { background: #EF4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .loading { text-align: center; padding: 40px; color: #757575; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        let adminToken = localStorage.getItem('adminToken');
        let currentUser = null;

        function render() {
            if (adminToken && currentUser) {
                renderDashboard();
            } else {
                renderLogin();
            }
        }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h2>🔐 El Farol - Admin</h2>
                        <p style="text-align:center;color:#757575;margin-bottom:24px;">Acceso restringido</p>
                        <form id="adminLoginForm">
                            <input type="email" id="adminEmail" placeholder="Correo electrónico" required>
                            <input type="password" id="adminPassword" placeholder="Contraseña" required>
                            <button type="submit" class="btn-primary">Ingresar</button>
                        </form>
                        <p style="text-align:center;margin-top:24px;font-size:0.8rem;">Solo personal autorizado</p>
                    </div>
                </div>
            `;
            document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.user?.role === 'admin') {
                    adminToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('adminToken', adminToken);
                    localStorage.setItem('adminUser', JSON.stringify(currentUser));
                    render();
                } else {
                    alert('Acceso denegado. No tienes permisos de administrador.');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
                <div class="admin-wrapper">
                    <aside class="sidebar">
                        <div class="sidebar-header"><div class="sidebar-logo">EL FAROL<span> Admin</span></div></div>
                        <div class="sidebar-user">
                            <div class="user-avatar"><i class="fas fa-user"></i></div>
                            <div><strong>${currentUser?.name || 'Admin'}</strong><br><small>Administrador</small></div>
                        </div>
                        <nav>
                            <a href="#" class="nav-link active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                            <a href="#" class="nav-link" data-page="users"><i class="fas fa-users"></i> Usuarios</a>
                            <a href="#" class="nav-link" data-page="ads"><i class="fas fa-ad"></i> Anuncios</a>
                        </nav>
                    </aside>
                    <main class="main-content">
                        <div class="topbar">
                            <h1 id="pageTitle">Dashboard</h1>
                            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Salir</button>
                        </div>
                        <div id="pageContent"></div>
                    </main>
                </div>
            `;
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    loadPage(link.dataset.page);
                });
            });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.clear();
                adminToken = null;
                currentUser = null;
                render();
            });
            loadPage('dashboard');
        }

        async function loadPage(page) {
            const pageContent = document.getElementById('pageContent');
            const pageTitle = document.getElementById('pageTitle');
            
            if (page === 'dashboard') {
                pageTitle.textContent = 'Dashboard';
                pageContent.innerHTML = '<div class="loading">Cargando...</div>';
                try {
                    const res = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${adminToken}` } });
                    const stats = await res.json();
                    pageContent.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card"><h3>👥 Total Usuarios</h3><div class="stat-value">${stats.totalUsers || 0}</div></div>
                            <div class="stat-card"><h3>📢 Anuncios Activos</h3><div class="stat-value">${stats.activeAds || 0}</div></div>
                            <div class="stat-card"><h3>💰 Ventas del Mes</h3><div class="stat-value">RD$${stats.monthlySales || 0}</div></div>
                            <div class="stat-card"><h3>⏳ Pendientes</h3><div class="stat-value">${stats.pendingAds || 0}</div></div>
                        </div>
                        <div class="table-container"><h3>📋 Usuarios Recientes</h3><div id="recentUsers">Cargando...</div></div>
                    `;
                    loadRecentUsers();
                } catch(e) { pageContent.innerHTML = '<div class="loading">Error cargando datos</div>'; }
            } else if (page === 'users') {
                pageTitle.textContent = 'Usuarios';
                pageContent.innerHTML = '<div class="loading">Cargando usuarios...</div>';
                try {
                    const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${adminToken}` } });
                    const data = await res.json();
                    pageContent.innerHTML = renderUsersTable(data.users || []);
                } catch(e) { pageContent.innerHTML = '<div class="loading">Error cargando usuarios</div>'; }
            } else if (page === 'ads') {
                pageTitle.textContent = 'Anuncios';
                pageContent.innerHTML = '<div class="loading">Cargando anuncios...</div>';
                try {
                    const res = await fetch('/api/admin/ads', { headers: { 'Authorization': `Bearer ${adminToken}` } });
                    const data = await res.json();
                    pageContent.innerHTML = renderAdsTable(data.ads || []);
                } catch(e) { pageContent.innerHTML = '<div class="loading">Error cargando anuncios</div>'; }
            }
        }

        async function loadRecentUsers() {
            try {
                const res = await fetch('/api/admin/users?limit=5', { headers: { 'Authorization': `Bearer ${adminToken}` } });
                const data = await res.json();
                document.getElementById('recentUsers').innerHTML = renderUsersTable(data.users || []);
            } catch(e) { document.getElementById('recentUsers').innerHTML = '<p>Error</p>'; }
        }

        function renderUsersTable(users) {
            if (!users.length) return '<p>No hay usuarios</p>';
            return `<table><thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Registro</th></tr></thead><tbody>
                ${users.map(u => `<tr><td>${u.name || '-'}</td><td>${u.email}</td><td>${u.phone || '-'}</td><td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('')}
            </tbody></table>`;
        }

        function renderAdsTable(ads) {
            if (!ads.length) return '<p>No hay anuncios</p>';
            return `<table><thead><tr><th>Título</th><th>Usuario</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
                ${ads.map(ad => `<tr>
                    <td>${ad.title}</td><td>${ad.user_email || ad.user_id}</td><td>$${ad.price || 0}</td>
                    <td><span class="status-badge status-active">${ad.status === 'active' ? 'Activo' : 'Pendiente'}</span></td>
                    <td>${ad.status !== 'active' ? `<button class="btn-approve" onclick="approveAd(${ad.id})">Aprobar</button>` : ''}
                    <button class="btn-delete" onclick="deleteAd(${ad.id})">Eliminar</button></td>
                </tr>`).join('')}
            </tbody></table>`;
        }

        window.approveAd = async (id) => {
            if(!confirm('¿Aprobar este anuncio?')) return;
            const res = await fetch(`/api/admin/ads/${id}/approve`, { method: 'PUT', headers: { 'Authorization': `Bearer ${adminToken}` } });
            if(res.ok) { alert('Aprobado'); loadPage('ads'); }
            else alert('Error');
        };
        window.deleteAd = async (id) => {
            if(!confirm('¿Eliminar este anuncio?')) return;
            const res = await fetch(`/api/admin/ads/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
            if(res.ok) { alert('Eliminado'); loadPage('ads'); }
            else alert('Error');
        };

        const savedToken = localStorage.getItem('adminToken');
        const savedUser = localStorage.getItem('adminUser');
        if (savedToken && savedUser) {
            adminToken = savedToken;
            currentUser = JSON.parse(savedUser);
        }
        render();
    </script>
</body>
</html>
EOF
