<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Farol - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #001f3f; } /* Azul Marino Farol */
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md text-center">
        <div class="mb-4">
            <span class="text-4xl">🏮</span>
            <h1 class="text-2xl font-bold text-gray-800 mt-2">EL FAROL ADMIN</h1>
            <p class="text-sm text-gray-500">Panel de administración</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required 
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-900">
            <input type="password" id="password" placeholder="Contraseña" required 
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-900">
            
            <button type="submit" 
                class="w-full bg-[#001f3f] text-white py-2 rounded font-bold hover:bg-blue-900 transition">
                ACCEDER AL PANEL
            </button>
        </form>
        <div id="message" class="mt-4 text-red-600 text-sm hidden"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success && data.user.role === 'admin') {
                    localStorage.setItem('adminToken', data.token);
                    // AQUÍ ES DONDE ENTRA AL PANEL REAL
                    alert('¡Bienvenido Jefe mxl! Entrando al sistema...');
                    window.location.href = '/admin-dashboard'; 
                } else {
                    msgDiv.textContent = "Acceso denegado: Usuario no es administrador.";
                    msgDiv.classList.remove('hidden');
                }
            } catch (error) {
                msgDiv.textContent = "Error de conexión con el servidor.";
                msgDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
